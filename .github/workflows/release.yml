name: Release Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: statusapp-io/statusapp-agent

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Test
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build standalone binaries
        run: |
          mkdir -p dist
          for PAIR in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            OS="${PAIR%/*}"
            ARCH="${PAIR#*/}"
            OUTPUT="dist/statusapp-agent-${OS}-${ARCH}"
            [ "$OS" = "windows" ] && OUTPUT="${OUTPUT}.exe"
            CGO_ENABLED=0 GOOS=$OS GOARCH=$ARCH go build -ldflags="-s -w" -o "$OUTPUT" .
            echo "Built: $OUTPUT ($(du -sh $OUTPUT | cut -f1))"
          done

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: statusapp-agent-binaries-${{ github.ref_name }}
          path: dist/
          retention-days: 90

      - name: Make package public
        run: |
          gh api \
            --method PATCH \
            /orgs/statusapp-io/packages/container/statusapp-agent/visibility \
            -f visibility=public || echo "Package visibility update skipped (may already be public)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
