name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o bin/statusapp-agent .

      - name: Test
        run: go test ./...

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s bin/statusapp-agent)
          SIZE_MB=$((SIZE / 1048576))
          echo "Binary size: ${SIZE_MB}MB"
