name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: Agent Version
      description: Output of the agent startup log or the version you downloaded
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker
        - Docker Compose
        - Binary (built from source)
        - Binary (prebuilt release)
    validations:
      required: true

  - type: dropdown
    id: check-type
    attributes:
      label: Check Type (if applicable)
      options:
        - HTTP
        - HTTPS
        - Website
        - API
        - GraphQL
        - Keyword
        - Port / TCP
        - Ping
        - DNS
        - SSL Certificate
        - N/A

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Configure agent with...
        2. Run the agent...
        3. Observe...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (redact secrets)
      render: text

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Docker version if applicable
      placeholder: "e.g., Ubuntu 22.04, amd64, Docker 24.0.7"
